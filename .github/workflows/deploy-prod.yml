name: Deploy Production

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BACKEND_IMAGE: codeit09/gpuscoutbackend
  FRONTEND_IMAGE: codeit09/gpuscoutfrontend

jobs:
  deploy:
    name: Build & Deploy Production
    runs-on: ubuntu-latest

    environment:
      name: Production

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate Version
        id: version
        run: |
          echo "VERSION=${GITHUB_SHA::7}" >> $GITHUB_ENV

      ##################################################
      # Backend
      ##################################################

      - name: Build and Push Backend
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ env.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      ##################################################
      # Frontend
      ##################################################

      - name: Build and Push Frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            VITE_BACKEND_URL=${{ vars.VITE_BACKEND_URL }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ env.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      ##################################################
      # Azure Login
      ##################################################

      - name: Azure Login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      ##################################################
      # Deploy Backend
      ##################################################

      - name: Deploy Backend
        uses: azure/webapps-deploy@v3
        with:
          app-name: gpuscoutbackend
          images: ${{ env.BACKEND_IMAGE }}:latest

      ##################################################
      # Deploy Frontend
      ##################################################

      - name: Deploy Frontend
        uses: azure/webapps-deploy@v3
        with:
          app-name: gpuscoutfrontend
          images: ${{ env.FRONTEND_IMAGE }}:latest

      ##################################################
      # Deployment Summary
      ##################################################

      - name: Deployment Summary
        run: |
          echo "🚀 Production Deployment Successful"
          echo "Backend Image : ${{ env.BACKEND_IMAGE }}:latest"
          echo "Frontend Image: ${{ env.FRONTEND_IMAGE }}:latest"
          echo "Version       : ${{ env.VERSION }}"