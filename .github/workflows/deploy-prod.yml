name: Deploy Production

on:
  workflow_run:
    workflows:
      - Release
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BACKEND_IMAGE: codeit09/gpuscoutbackend
  FRONTEND_IMAGE: codeit09/gpuscoutfrontend

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    name: Build & Deploy Production
    runs-on: ubuntu-latest

    environment:
      name: Production

    steps:
      ##################################################
      # Checkout Released Commit
      ##################################################

      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      ##################################################
      # Fetch Git Tags
      ##################################################

      - name: Fetch Tags
        run: |
          git fetch --force --tags

      ##################################################
      # Get Latest Release Version
      ##################################################

      - name: Get Release Version
        id: version
        run: |
          VERSION=$(git describe --tags --abbrev=0)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      ##################################################
      # Setup Docker Buildx
      ##################################################

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      ##################################################
      # Login to Docker Hub
      ##################################################

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      ##################################################
      # Build & Push Backend
      ##################################################

      - name: Build and Push Backend
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ env.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      ##################################################
      # Build & Push Frontend
      ##################################################

      - name: Build and Push Frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            VITE_BACKEND_URL=${{ vars.VITE_BACKEND_URL }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ env.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      ##################################################
      # Azure Login
      ##################################################

      - name: Azure Login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      ##################################################
      # Deploy Backend
      ##################################################

      - name: Deploy Backend
        uses: azure/webapps-deploy@v3
        with:
          app-name: gpuscoutbackend
          images: ${{ env.BACKEND_IMAGE }}:${{ env.VERSION }}

      ##################################################
      # Deploy Frontend
      ##################################################

      - name: Deploy Frontend
        uses: azure/webapps-deploy@v3
        with:
          app-name: gpuscoutfrontend
          images: ${{ env.FRONTEND_IMAGE }}:${{ env.VERSION }}

      ##################################################
      # Deployment Summary
      ##################################################

      - name: Deployment Summary
        run: |
          echo "🚀 Production Deployment Successful"
          echo ""
          echo "Release Version : ${{ env.VERSION }}"
          echo "Backend Image   : ${{ env.BACKEND_IMAGE }}:${{ env.VERSION }}"
          echo "Frontend Image  : ${{ env.FRONTEND_IMAGE }}:${{ env.VERSION }}"
          echo ""
          echo "Docker Tags:"
          echo "  - latest"
          echo "  - ${{ env.VERSION }}"
          echo ""
          echo "Azure Apps:"
          echo "  - Backend : gpuscoutbackend"
          echo "  - Frontend: gpuscoutfrontend"