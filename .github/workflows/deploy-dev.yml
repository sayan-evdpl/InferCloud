name: Deploy Development

on:
  push:
    branches:
      - dev

permissions:
  contents: read

concurrency:
  group: deploy-development
  cancel-in-progress: true

env:
  BACKEND_IMAGE: codeit09/gpuscoutbackend
  FRONTEND_IMAGE: codeit09/gpuscoutfrontend

jobs:
  deploy:
    name: Build & Deploy to Development
    runs-on: ubuntu-latest

    environment:
      name: Development

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      ##################################################
      # Backend
      ##################################################

      - name: Build and Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      ##################################################
      # Frontend
      ##################################################

      - name: Build and Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            VITE_BACKEND_URL=${{ vars.VITE_BACKEND_URL }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      ##################################################
      # Azure Login
      ##################################################

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      ##################################################
      # Deploy Backend to Staging Slot
      ##################################################

      - name: Deploy Backend
        uses: azure/webapps-deploy@v3
        with:
          app-name: gpuscoutbackend
          slot-name: staging
          images: ${{ env.BACKEND_IMAGE }}:dev

      ##################################################
      # Deploy Frontend to Staging Slot
      ##################################################

      - name: Deploy Frontend
        uses: azure/webapps-deploy@v3
        with:
          app-name: gpuscoutfrontend
          slot-name: staging
          images: ${{ env.FRONTEND_IMAGE }}:dev